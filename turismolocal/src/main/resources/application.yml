server:
  port: 8080

spring:
  application:
    name: turismo_local

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/turismo_local}
    username: ${DB_USER:Estudiantes}
    password: ${DB_PASSWORD:ta2712mmy}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-name: Cliente web 1