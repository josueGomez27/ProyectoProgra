name: CI Proyecto Turismo Local

# El pipeline se ejecuta cuando hay push o pull request
# hacia las ramas principales del proyecto
on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

# Rutas de las carpetas principales del proyecto
env:
  FRONTEND_DIR: turismo-local-frontend
  BACKEND_DIR: turismolocal

jobs:
  # FRONTEND
  frontend:
    name: Frontend - Lint, Tests y Build
    runs-on: ubuntu-latest

    steps:
      # Descarga el código del repositorio
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # Configura Node.js para compilar y probar el frontend
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      # Instala dependencias exactas desde package-lock.json
      - name: Instalar dependencias del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      # Ejecuta ESLint para revisar errores de código en React
      - name: Ejecutar linter del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      # Ejecuta pruebas del frontend si existen
      - name: Ejecutar tests del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run test --if-present -- --run

      # Genera reporte de cobertura si existe script coverage
      - name: Generar cobertura del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run coverage --if-present

      # Genera el build final del frontend
      - name: Construir frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      # Guarda cobertura del frontend como evidencia del pipeline
      - name: Guardar cobertura frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ env.FRONTEND_DIR }}/coverage
          if-no-files-found: ignore

  # BACKEND
  backend:
    name: Backend - Tests y Build
    runs-on: ubuntu-latest

    steps:
      # Descarga el código del repositorio
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # Configura Java para el backend
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Compila el backend y ejecuta pruebas con Maven
      # clean verify ejecuta el ciclo completo de validación
      - name: Ejecutar tests y build del backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: mvn clean verify

      # Guarda cobertura JaCoCo si el backend la genera
      - name: Guardar cobertura backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.BACKEND_DIR }}/target/site/jacoco
          if-no-files-found: ignore


  # SONARCLOUD
  sonarcloud:
    name: SonarCloud - Quality Gate
    runs-on: ubuntu-latest

    # SonarCloud se ejecuta después de validar frontend y backend
    needs:
      - frontend
      - backend

    steps:
      # Descarga el repositorio completo
      # fetch-depth 0 permite que SonarCloud analice mejor el historial
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Configura Java porque SonarCloud necesita analizar el backend Java
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Configura Node.js porque también se analiza el frontend
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      # Instala dependencias del frontend para poder generar cobertura si aplica
      - name: Instalar dependencias del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      # Genera cobertura del frontend si existe el script
      - name: Generar cobertura frontend para SonarCloud
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run coverage --if-present

      # Ejecuta pruebas/build del backend para generar clases y cobertura
      - name: Generar build y cobertura backend para SonarCloud
        working-directory: ${{ env.BACKEND_DIR }}
        run: mvn clean verify

      # Ejecuta análisis de SonarCloud.
      # SONAR_TOKEN guardado en GitHub Secrets.
      - name: Ejecutar análisis SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Falla el pipeline si el Quality Gate no cumple.
      # Esto hace que el criterio de calidad sea obligatorio.
      - name: Verificar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}