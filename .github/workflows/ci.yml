name: CI Proyecto Turismo Local

# El pipeline se ejecuta cuando hay push o pull request
# hacia las ramas principales del proyecto
on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

# Rutas de las carpetas principales del proyecto
env:
  FRONTEND_DIR: turismo-local-frontend
  BACKEND_DIR: turismolocal

jobs:
  # FRONTEND: React + Vite
  frontend:
    name: Frontend - Lint y Build
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Ejecutar linter del frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      - name: Construir frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

  # BACKEND: Spring Boot + Tests + Cobertura + SonarCloud
  backend:
    name: Backend - Tests, Cobertura y SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Ejecuta pruebas y genera reporte JaCoCo
      - name: Ejecutar tests del backend con cobertura
        working-directory: ${{ env.BACKEND_DIR }}
        run: mvn clean verify

      # Envía el análisis a SonarCloud usando sonar-project.properties
      - name: Analizar con SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}